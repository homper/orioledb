name: dockerhub

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  cache_layers:
    name: Cache Docker image parts
    uses: ./.github/workflows/docker_reusable.yml
    with:
      caching_layers: true

  push_to_registry:
    needs:
      - cache_layers
    name: Push Docker image to Docker Hub
    uses: ./.github/workflows/docker_reusable.yml
